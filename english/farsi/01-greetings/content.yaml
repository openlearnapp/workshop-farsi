version: 1
number: 1
title: "Greetings and Politeness"
description: "The most important greetings and polite expressions in Farsi"
sections:
  - title: "Greetings"
    explanation: |
      **Farsi greetings** are an important part of Persian culture.
      The most common greeting is "سلام" (Salām), which can be used in all situations.
      More formal greetings depend on the time of day.
    examples:
      - q: "سلام"
        a: "Hello"
        rel:
          - ["سلام", "Hello", "informal greeting"]
      - q: "صبح بخیر"
        a: "Good morning"
        rel:
          - ["صبح", "morning", "noun"]
          - ["بخیر", "good / well", "adjective"]
      - q: "عصر بخیر"
        a: "Good evening"
        rel:
          - ["عصر", "afternoon / evening", "noun"]
          - ["بخیر", "good / well", "adjective"]
      - q: "شب بخیر"
        a: "Good night"
        rel:
          - ["شب", "night", "noun"]
          - ["بخیر", "good / well", "adjective"]
      - q: "خداحافظ"
        a: "Goodbye"
        rel:
          - ["خداحافظ", "goodbye", "formal farewell"]
  - title: "Polite Expressions"
    explanation: |
      **Politeness** is highly valued in Farsi. Persian culture places great emphasis on
      respectful manners. Here are the most important polite expressions.
    examples:
      - q: "ممنون / متشکرم"
        a: "Thank you"
        rel:
          - ["ممنون", "thanks", "informal"]
          - ["متشکرم", "I thank you", "formal"]
      - q: "لطفاً"
        a: "Please"
        rel:
          - ["لطفاً", "please", "polite form"]
      - q: "خواهش می‌کنم"
        a: "You're welcome"
        rel:
          - ["خواهش", "request / wish", "noun"]
          - ["می‌کنم", "I do", "verb"]
      - q: "ببخشید"
        a: "Excuse me"
        rel:
          - ["ببخشید", "excuse me / pardon", "polite form"]
  - title: "Introducing Yourself"
    explanation: |
      **Introducing yourself** is important for making new acquaintances.
      The following sentences help you introduce yourself in Farsi and ask how someone is doing.
    examples:
      - q: "حال شما چطور است؟"
        a: "How are you?"
        rel:
          - ["حال", "state / condition", "noun"]
          - ["شما", "you", "pronoun, formal"]
          - ["چطور", "how", "question word"]
      - q: "خوبم، ممنون"
        a: "I'm fine, thank you"
        rel:
          - ["خوبم", "I'm fine", "adjective + verb"]
          - ["ممنون", "thank you", "polite form"]
      - q: "اسم من ... است"
        a: "My name is ..."
        rel:
          - ["اسم", "name", "noun"]
          - ["من", "I / my", "pronoun"]
          - ["است", "is", "verb to be"]
      - q: "از آشنایی شما خوشوقتم"
        a: "Nice to meet you"
        rel:
          - ["آشنایی", "acquaintance", "noun"]
          - ["خوشوقتم", "I am pleased", "adjective + verb"]
