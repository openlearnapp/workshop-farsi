version: 1
number: 3
title: "Zahlen und Zeitangaben"
description: "Zahlen von 1 bis 20, Wochentage und Uhrzeiten auf Farsi"
sections:
  - title: "Zahlen 1 bis 10"
    explanation: |
      **Persische Zahlen** haben ein eigenes Zahlensystem. Die Zahlen werden von links
      nach rechts geschrieben, anders als der persische Text. Hier sind die Zahlen 1 bis 10.
    examples:
      - q: "یک / ۱"
        a: "Eins (1)"
        rel:
          - ["یک", "eins", "Zahl"]
      - q: "دو / ۲"
        a: "Zwei (2)"
        rel:
          - ["دو", "zwei", "Zahl"]
      - q: "سه / ۳"
        a: "Drei (3)"
        rel:
          - ["سه", "drei", "Zahl"]
      - q: "چهار / ۴"
        a: "Vier (4)"
        rel:
          - ["چهار", "vier", "Zahl"]
      - q: "پنج / ۵"
        a: "Fünf (5)"
        rel:
          - ["پنج", "fünf", "Zahl"]
  - title: "Zahlen 11 bis 20"
    explanation: |
      **Zahlen ab 11** werden im Farsi zusammengesetzt gebildet, ähnlich wie im Deutschen.
    examples:
      - q: "یازده / ۱۱"
        a: "Elf (11)"
        rel:
          - ["یازده", "elf", "Zahl"]
      - q: "دوازده / ۱۲"
        a: "Zwölf (12)"
        rel:
          - ["دوازده", "zwölf", "Zahl"]
      - q: "سیزده / ۱۳"
        a: "Dreizehn (13)"
        rel:
          - ["سیزده", "dreizehn", "Zahl"]
      - q: "پانزده / ۱۵"
        a: "Fünfzehn (15)"
        rel:
          - ["پانزده", "fünfzehn", "Zahl"]
      - q: "بیست / ۲۰"
        a: "Zwanzig (20)"
        rel:
          - ["بیست", "zwanzig", "Zahl"]
  - title: "Wochentage und Uhrzeit"
    explanation: |
      **Der iranische Kalender** beginnt die Woche am Samstag (شنبه).
      Der Freitag ist der freie Tag, vergleichbar mit dem Sonntag in Deutschland.
    examples:
      - q: "شنبه"
        a: "Samstag"
        rel:
          - ["شنبه", "Samstag", "Wochentag"]
      - q: "یکشنبه"
        a: "Sonntag"
        rel:
          - ["یکشنبه", "Sonntag", "Wochentag"]
      - q: "دوشنبه"
        a: "Montag"
        rel:
          - ["دوشنبه", "Montag", "Wochentag"]
      - q: "جمعه"
        a: "Freitag"
        rel:
          - ["جمعه", "Freitag", "Wochentag, freier Tag"]
      - q: "ساعت چند است؟"
        a: "Wie spät ist es?"
        rel:
          - ["ساعت", "Uhr / Stunde", "Substantiv"]
          - ["چند", "wie viel", "Fragewort"]
