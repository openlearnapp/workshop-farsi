version: 1
number: 1
title: "Begrüßungen und Höflichkeit"
description: "Die wichtigsten Begrüßungen und höflichen Ausdrücke auf Farsi"
sections:
  - title: "Begrüßungen"
    explanation: |
      **Farsi-Begrüßungen** sind ein wichtiger Teil der persischen Kultur.
      Die häufigste Begrüßung ist „سلام" (Salām), die in allen Situationen verwendet werden kann.
      Formellere Begrüßungen hängen von der Tageszeit ab.
    examples:
      - q: "سلام"
        a: "Hallo"
        rel:
          - ["سلام", "Hallo", "informelle Begrüßung"]
      - q: "صبح بخیر"
        a: "Guten Morgen"
        rel:
          - ["صبح", "Morgen", "Substantiv"]
          - ["بخیر", "gut / wohl", "Adjektiv"]
      - q: "عصر بخیر"
        a: "Guten Abend"
        rel:
          - ["عصر", "Nachmittag / Abend", "Substantiv"]
          - ["بخیر", "gut / wohl", "Adjektiv"]
      - q: "شب بخیر"
        a: "Gute Nacht"
        rel:
          - ["شب", "Nacht", "Substantiv"]
          - ["بخیر", "gut / wohl", "Adjektiv"]
      - q: "خداحافظ"
        a: "Auf Wiedersehen"
        rel:
          - ["خداحافظ", "Auf Wiedersehen", "formeller Abschied"]
  - title: "Höfliche Ausdrücke"
    explanation: |
      **Höflichkeit** wird im Farsi großgeschrieben. Die persische Kultur legt viel Wert auf
      respektvolle Umgangsformen. Hier sind die wichtigsten höflichen Ausdrücke.
    examples:
      - q: "ممنون / متشکرم"
        a: "Danke"
        rel:
          - ["ممنون", "Danke", "informell"]
          - ["متشکرم", "Ich danke Ihnen", "formell"]
      - q: "لطفاً"
        a: "Bitte"
        rel:
          - ["لطفاً", "Bitte", "Höflichkeitsform"]
      - q: "خواهش می‌کنم"
        a: "Bitte sehr / Gern geschehen"
        rel:
          - ["خواهش", "Bitte / Wunsch", "Substantiv"]
          - ["می‌کنم", "ich mache / tue", "Verb"]
      - q: "ببخشید"
        a: "Entschuldigung"
        rel:
          - ["ببخشید", "Entschuldigung / Verzeihung", "Höflichkeitsform"]
  - title: "Sich vorstellen"
    explanation: |
      **Sich vorstellen** ist wichtig, um neue Bekanntschaften zu machen.
      Die folgenden Sätze helfen Ihnen, sich auf Farsi vorzustellen und nach dem Befinden zu fragen.
    examples:
      - q: "حال شما چطور است؟"
        a: "Wie geht es Ihnen?"
        rel:
          - ["حال", "Zustand / Befinden", "Substantiv"]
          - ["شما", "Sie / Ihnen", "Pronomen, formell"]
          - ["چطور", "wie", "Fragewort"]
      - q: "خوبم، ممنون"
        a: "Mir geht es gut, danke"
        rel:
          - ["خوبم", "mir geht es gut", "Adjektiv + Verb"]
          - ["ممنون", "danke", "Höflichkeitsform"]
      - q: "اسم من ... است"
        a: "Mein Name ist ..."
        rel:
          - ["اسم", "Name", "Substantiv"]
          - ["من", "ich / mein", "Pronomen"]
          - ["است", "ist", "Verb sein"]
      - q: "از آشنایی شما خوشوقتم"
        a: "Freut mich, Sie kennenzulernen"
        rel:
          - ["آشنایی", "Bekanntschaft", "Substantiv"]
          - ["خوشوقتم", "ich bin erfreut", "Adjektiv + Verb"]
