version: 1
number: 1
title: "احوالپرسی و ادب"
description: "مهم‌ترین احوالپرسی‌ها و عبارات مؤدبانه به آلمانی"
sections:
  - title: "احوالپرسی"
    explanation: |
      **احوالپرسی آلمانی** بخش مهمی از فرهنگ آلمانی است.
      رایج‌ترین سلام "Hallo" است که در همه موقعیت‌ها استفاده می‌شود.
      احوالپرسی‌های رسمی‌تر به زمان روز بستگی دارد.
    examples:
      - q: "Hallo"
        a: "سلام"
        rel:
          - ["Hallo", "سلام", "غیررسمی"]
      - q: "Guten Morgen"
        a: "صبح بخیر"
        rel:
          - ["Guten", "خوب", "صفت"]
          - ["Morgen", "صبح", "اسم"]
      - q: "Guten Abend"
        a: "عصر بخیر"
        rel:
          - ["Guten", "خوب", "صفت"]
          - ["Abend", "عصر", "اسم"]
      - q: "Gute Nacht"
        a: "شب بخیر"
        rel:
          - ["Gute", "خوب", "صفت"]
          - ["Nacht", "شب", "اسم"]
      - q: "Auf Wiedersehen"
        a: "خداحافظ"
        rel:
          - ["Auf Wiedersehen", "خداحافظ", "خداحافظی رسمی"]
  - title: "عبارات مؤدبانه"
    explanation: |
      **ادب** در زبان آلمانی بسیار مهم است. فرهنگ آلمانی به رفتار
      محترمانه اهمیت زیادی می‌دهد. اینجا مهم‌ترین عبارات مؤدبانه را یاد می‌گیرید.
    examples:
      - q: "Danke"
        a: "ممنون / متشکرم"
        rel:
          - ["Danke", "ممنون", "غیررسمی"]
      - q: "Bitte"
        a: "لطفاً"
        rel:
          - ["Bitte", "لطفاً", "عبارت مؤدبانه"]
      - q: "Bitte sehr"
        a: "خواهش می‌کنم"
        rel:
          - ["Bitte sehr", "خواهش می‌کنم", "عبارت مؤدبانه"]
      - q: "Entschuldigung"
        a: "ببخشید"
        rel:
          - ["Entschuldigung", "ببخشید", "عبارت مؤدبانه"]
  - title: "معرفی خود"
    explanation: |
      **معرفی خود** برای آشنایی‌های جدید مهم است.
      جملات زیر به شما کمک می‌کنند خود را به آلمانی معرفی کنید.
    examples:
      - q: "Wie geht es Ihnen?"
        a: "حال شما چطور است؟"
        rel:
          - ["Wie", "چطور", "کلمه پرسشی"]
          - ["geht", "می‌رود", "فعل"]
          - ["Ihnen", "شما", "ضمیر، رسمی"]
      - q: "Mir geht es gut, danke"
        a: "خوبم، ممنون"
        rel:
          - ["gut", "خوب", "صفت"]
          - ["danke", "ممنون", "عبارت مؤدبانه"]
      - q: "Mein Name ist ..."
        a: "اسم من ... است"
        rel:
          - ["Mein", "من / مال من", "ضمیر ملکی"]
          - ["Name", "اسم / نام", "اسم"]
      - q: "Freut mich"
        a: "از آشنایی شما خوشوقتم"
        rel:
          - ["Freut", "خوشحال می‌کند", "فعل"]
          - ["mich", "مرا", "ضمیر"]
