version: 1
number: 5
title: "سفر و مسیریابی"
description: "جهت‌ها، وسایل حمل و نقل و عبارات مهم سفر به آلمانی"
sections:
  - title: "جهت‌ها و مکان‌ها"
    explanation: |
      **جهت‌ها** در سفر ضروری هستند. اینجا یاد می‌گیرید
      چگونه به آلمانی آدرس بپرسید و جهت‌ها را بفهمید.
    examples:
      - q: "Rechts"
        a: "راست"
        rel:
          - ["Rechts", "راست", "جهت"]
      - q: "Links"
        a: "چپ"
        rel:
          - ["Links", "چپ", "جهت"]
      - q: "Geradeaus"
        a: "مستقیم"
        rel:
          - ["Geradeaus", "مستقیم", "جهت"]
      - q: "Wo ist ...?"
        a: "کجاست؟ ... "
        rel:
          - ["Wo", "کجا", "کلمه پرسشی"]
          - ["ist", "است", "فعل بودن"]
      - q: "Nah"
        a: "نزدیک"
        rel:
          - ["Nah", "نزدیک", "صفت"]
      - q: "Weit"
        a: "دور"
        rel:
          - ["Weit", "دور", "صفت"]
  - title: "وسایل حمل و نقل"
    explanation: |
      **وسایل حمل و نقل در آلمان** – تاکسی، اتوبوس و مترو
      رایج‌ترین وسایل حمل و نقل در شهرهای آلمانی هستند.
    examples:
      - q: "Taxi"
        a: "تاکسی"
        rel:
          - ["Taxi", "تاکسی", "اسم"]
      - q: "Bus"
        a: "اتوبوس"
        rel:
          - ["Bus", "اتوبوس", "اسم"]
      - q: "U-Bahn"
        a: "مترو"
        rel:
          - ["U-Bahn", "مترو", "اسم"]
      - q: "Flughafen"
        a: "فرودگاه"
        rel:
          - ["Flughafen", "فرودگاه", "اسم"]
      - q: "Haltestelle"
        a: "ایستگاه"
        rel:
          - ["Haltestelle", "ایستگاه", "اسم"]
  - title: "جملات مهم سفر"
    explanation: |
      **جملات مفید برای مسافران** – این عبارات به شما کمک می‌کنند
      در آلمان راه خود را پیدا کنید و کمک بخواهید.
    examples:
      - q: "Ich habe mich verlaufen"
        a: "من گم شده‌ام"
        rel:
          - ["Ich", "من", "ضمیر"]
          - ["verlaufen", "گم شدن", "فعل"]
      - q: "Können Sie mir helfen?"
        a: "می‌توانید کمکم کنید؟"
        rel:
          - ["Können", "توانستن", "فعل"]
          - ["helfen", "کمک کردن", "فعل"]
      - q: "Wo ist das Hotel?"
        a: "هتل کجاست؟"
        rel:
          - ["Hotel", "هتل", "اسم"]
          - ["Wo ist", "کجاست", "کلمه پرسشی + فعل"]
      - q: "Sprechen Sie bitte langsamer"
        a: "لطفاً آهسته‌تر صحبت کنید"
        rel:
          - ["langsamer", "آهسته‌تر", "صفت تفضیلی"]
          - ["Sprechen Sie", "صحبت کنید", "فعل"]
          - ["bitte", "لطفاً", "عبارت مؤدبانه"]
