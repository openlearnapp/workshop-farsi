version: 1
number: 4
title: "غذا و خرید"
description: "مواد غذایی، سفارش در رستوران و عبارات خرید به آلمانی"
sections:
  - title: "مواد غذایی"
    explanation: |
      **آشپزی آلمانی** متنوع و خوشمزه است. اینجا مهم‌ترین
      کلمات مربوط به غذا و نوشیدنی را به آلمانی یاد می‌گیرید.
    examples:
      - q: "Brot"
        a: "نان"
        rel:
          - ["Brot", "نان", "اسم"]
      - q: "Reis"
        a: "برنج"
        rel:
          - ["Reis", "برنج", "اسم"]
      - q: "Fleisch"
        a: "گوشت"
        rel:
          - ["Fleisch", "گوشت", "اسم"]
      - q: "Hähnchen"
        a: "مرغ"
        rel:
          - ["Hähnchen", "مرغ", "اسم"]
      - q: "Wasser"
        a: "آب"
        rel:
          - ["Wasser", "آب", "اسم"]
      - q: "Tee"
        a: "چای"
        rel:
          - ["Tee", "چای", "اسم"]
  - title: "در رستوران"
    explanation: |
      **سفارش دادن در رستوران** – این جملات به شما کمک می‌کنند
      در رستوران آلمانی سفارش دهید.
    examples:
      - q: "Die Speisekarte, bitte"
        a: "منو را لطفاً"
        rel:
          - ["Speisekarte", "منو", "اسم"]
          - ["bitte", "لطفاً", "عبارت مؤدبانه"]
      - q: "Ich möchte das"
        a: "من این را می‌خواهم"
        rel:
          - ["Ich", "من", "ضمیر"]
          - ["möchte", "می‌خواهم", "فعل"]
      - q: "Die Rechnung, bitte"
        a: "صورتحساب لطفاً"
        rel:
          - ["Rechnung", "صورتحساب", "اسم"]
          - ["bitte", "لطفاً", "عبارت مؤدبانه"]
      - q: "Es war sehr lecker"
        a: "خیلی خوشمزه بود"
        rel:
          - ["sehr", "خیلی", "قید"]
          - ["lecker", "خوشمزه", "صفت"]
          - ["war", "بود", "فعل بودن، گذشته"]
  - title: "خرید"
    explanation: |
      **خرید در آلمان** – این عبارات در هنگام خرید به شما کمک می‌کنند.
    examples:
      - q: "Wie viel kostet das?"
        a: "این چند است؟"
        rel:
          - ["Wie viel", "چند / چقدر", "کلمه پرسشی"]
          - ["kostet", "قیمتش هست", "فعل"]
      - q: "Das ist sehr teuer"
        a: "خیلی گران است"
        rel:
          - ["sehr", "خیلی", "قید"]
          - ["teuer", "گران", "صفت"]
      - q: "Geht es nicht billiger?"
        a: "ارزان‌تر نمی‌شود؟"
        rel:
          - ["billiger", "ارزان‌تر", "صفت تفضیلی"]
          - ["nicht", "نه / نمی", "منفی"]
      - q: "Ich kaufe das"
        a: "این را می‌خرم"
        rel:
          - ["kaufe", "می‌خرم", "فعل"]
          - ["das", "این / آن", "ضمیر اشاره"]
