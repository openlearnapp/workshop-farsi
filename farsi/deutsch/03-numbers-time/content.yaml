version: 1
number: 3
title: "اعداد و زمان"
description: "اعداد ۱ تا ۲۰، روزهای هفته و ساعت به آلمانی"
sections:
  - title: "اعداد ۱ تا ۱۰"
    explanation: |
      **اعداد آلمانی** – اعداد پایه‌ای هستند که در زندگی روزمره
      به آن‌ها نیاز خواهید داشت. اینجا اعداد ۱ تا ۱۰ را یاد می‌گیرید.
    examples:
      - q: "Eins (1)"
        a: "یک / ۱"
        rel:
          - ["Eins", "یک", "عدد"]
      - q: "Zwei (2)"
        a: "دو / ۲"
        rel:
          - ["Zwei", "دو", "عدد"]
      - q: "Drei (3)"
        a: "سه / ۳"
        rel:
          - ["Drei", "سه", "عدد"]
      - q: "Vier (4)"
        a: "چهار / ۴"
        rel:
          - ["Vier", "چهار", "عدد"]
      - q: "Fünf (5)"
        a: "پنج / ۵"
        rel:
          - ["Fünf", "پنج", "عدد"]
  - title: "اعداد ۱۱ تا ۲۰"
    explanation: |
      **اعداد از ۱۱** در آلمانی به صورت ترکیبی ساخته می‌شوند.
    examples:
      - q: "Elf (11)"
        a: "یازده / ۱۱"
        rel:
          - ["Elf", "یازده", "عدد"]
      - q: "Zwölf (12)"
        a: "دوازده / ۱۲"
        rel:
          - ["Zwölf", "دوازده", "عدد"]
      - q: "Dreizehn (13)"
        a: "سیزده / ۱۳"
        rel:
          - ["Dreizehn", "سیزده", "عدد"]
      - q: "Fünfzehn (15)"
        a: "پانزده / ۱۵"
        rel:
          - ["Fünfzehn", "پانزده", "عدد"]
      - q: "Zwanzig (20)"
        a: "بیست / ۲۰"
        rel:
          - ["Zwanzig", "بیست", "عدد"]
  - title: "روزهای هفته و ساعت"
    explanation: |
      **تقویم آلمانی** هفته را از دوشنبه شروع می‌کند.
      یکشنبه روز تعطیل است.
    examples:
      - q: "Samstag"
        a: "شنبه"
        rel:
          - ["Samstag", "شنبه", "روز هفته"]
      - q: "Sonntag"
        a: "یکشنبه"
        rel:
          - ["Sonntag", "یکشنبه", "روز هفته"]
      - q: "Montag"
        a: "دوشنبه"
        rel:
          - ["Montag", "دوشنبه", "روز هفته"]
      - q: "Freitag"
        a: "جمعه"
        rel:
          - ["Freitag", "جمعه", "روز هفته"]
      - q: "Wie spät ist es?"
        a: "ساعت چند است؟"
        rel:
          - ["Wie spät", "ساعت چند", "کلمه پرسشی"]
          - ["ist", "است", "فعل بودن"]
