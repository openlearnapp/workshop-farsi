version: 1
number: 2
title: "کلمات روزمره"
description: "کلمات و عبارات پرکاربرد در زندگی روزمره آلمانی"
sections:
  - title: "کلمات پایه"
    explanation: |
      **کلمات پایه** اساس هر زبانی را تشکیل می‌دهند.
      این کلمات ساده را در آلمانی دائماً نیاز خواهید داشت.
    examples:
      - q: "Ja"
        a: "بله"
        rel:
          - ["Ja", "بله", "رسمی"]
      - q: "Nein"
        a: "نه / نخیر"
        rel:
          - ["Nein", "نه", "غیررسمی"]
      - q: "Gut"
        a: "خوب"
        rel:
          - ["Gut", "خوب", "صفت"]
      - q: "Schlecht"
        a: "بد"
        rel:
          - ["Schlecht", "بد", "صفت"]
      - q: "Groß"
        a: "بزرگ"
        rel:
          - ["Groß", "بزرگ", "صفت"]
      - q: "Klein"
        a: "کوچک"
        rel:
          - ["Klein", "کوچک", "صفت"]
  - title: "رنگ‌ها"
    explanation: |
      **رنگ‌ها به آلمانی** – رنگ‌ها کلمات مفیدی برای زندگی روزمره،
      خرید و توصیف هستند.
    examples:
      - q: "Rot"
        a: "قرمز"
        rel:
          - ["Rot", "قرمز", "رنگ"]
      - q: "Blau"
        a: "آبی"
        rel:
          - ["Blau", "آبی", "رنگ"]
      - q: "Grün"
        a: "سبز"
        rel:
          - ["Grün", "سبز", "رنگ"]
      - q: "Weiß"
        a: "سفید"
        rel:
          - ["Weiß", "سفید", "رنگ"]
      - q: "Schwarz"
        a: "سیاه"
        rel:
          - ["Schwarz", "سیاه", "رنگ"]
  - title: "اعضای خانواده"
    explanation: |
      **خانواده** در فرهنگ آلمانی جایگاه مهمی دارد.
      اینجا مهم‌ترین عناوین اعضای خانواده را یاد می‌گیرید.
    examples:
      - q: "Vater"
        a: "پدر"
        rel:
          - ["Vater", "پدر", "اسم"]
      - q: "Mutter"
        a: "مادر"
        rel:
          - ["Mutter", "مادر", "اسم"]
      - q: "Bruder"
        a: "برادر"
        rel:
          - ["Bruder", "برادر", "اسم"]
      - q: "Schwester"
        a: "خواهر"
        rel:
          - ["Schwester", "خواهر", "اسم"]
      - q: "Sohn"
        a: "پسر"
        rel:
          - ["Sohn", "پسر", "اسم"]
      - q: "Tochter"
        a: "دختر"
        rel:
          - ["Tochter", "دختر", "اسم"]
