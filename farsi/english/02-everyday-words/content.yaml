version: 1
number: 2
title: "کلمات روزمره"
description: "کلمات و عبارات پرکاربرد در زندگی روزمره انگلیسی"
sections:
  - title: "کلمات پایه"
    explanation: |
      **کلمات پایه** اساس هر زبانی را تشکیل می‌دهند.
      این کلمات ساده را در انگلیسی دائماً نیاز خواهید داشت.
    examples:
      - q: "Yes"
        a: "بله"
        rel:
          - ["Yes", "بله", "رسمی"]
      - q: "No"
        a: "نه / نخیر"
        rel:
          - ["No", "نه", "غیررسمی"]
      - q: "Good"
        a: "خوب"
        rel:
          - ["Good", "خوب", "صفت"]
      - q: "Bad"
        a: "بد"
        rel:
          - ["Bad", "بد", "صفت"]
      - q: "Big"
        a: "بزرگ"
        rel:
          - ["Big", "بزرگ", "صفت"]
      - q: "Small"
        a: "کوچک"
        rel:
          - ["Small", "کوچک", "صفت"]
  - title: "رنگ‌ها"
    explanation: |
      **رنگ‌ها به انگلیسی** – رنگ‌ها کلمات مفیدی برای زندگی روزمره،
      خرید و توصیف هستند.
    examples:
      - q: "Red"
        a: "قرمز"
        rel:
          - ["Red", "قرمز", "رنگ"]
      - q: "Blue"
        a: "آبی"
        rel:
          - ["Blue", "آبی", "رنگ"]
      - q: "Green"
        a: "سبز"
        rel:
          - ["Green", "سبز", "رنگ"]
      - q: "White"
        a: "سفید"
        rel:
          - ["White", "سفید", "رنگ"]
      - q: "Black"
        a: "سیاه"
        rel:
          - ["Black", "سیاه", "رنگ"]
  - title: "اعضای خانواده"
    explanation: |
      **خانواده** در هر فرهنگی جایگاه مهمی دارد.
      اینجا مهم‌ترین عناوین اعضای خانواده را به انگلیسی یاد می‌گیرید.
    examples:
      - q: "Father"
        a: "پدر"
        rel:
          - ["Father", "پدر", "اسم"]
      - q: "Mother"
        a: "مادر"
        rel:
          - ["Mother", "مادر", "اسم"]
      - q: "Brother"
        a: "برادر"
        rel:
          - ["Brother", "برادر", "اسم"]
      - q: "Sister"
        a: "خواهر"
        rel:
          - ["Sister", "خواهر", "اسم"]
      - q: "Son"
        a: "پسر"
        rel:
          - ["Son", "پسر", "اسم"]
      - q: "Daughter"
        a: "دختر"
        rel:
          - ["Daughter", "دختر", "اسم"]
