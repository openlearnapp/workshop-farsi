version: 1
number: 5
title: "سفر و مسیریابی"
description: "جهت‌ها، وسایل حمل و نقل و عبارات مهم سفر به انگلیسی"
sections:
  - title: "جهت‌ها و مکان‌ها"
    explanation: |
      **جهت‌ها** در سفر ضروری هستند. اینجا یاد می‌گیرید
      چگونه به انگلیسی آدرس بپرسید و جهت‌ها را بفهمید.
    examples:
      - q: "Right"
        a: "راست"
        rel:
          - ["Right", "راست", "جهت"]
      - q: "Left"
        a: "چپ"
        rel:
          - ["Left", "چپ", "جهت"]
      - q: "Straight ahead"
        a: "مستقیم"
        rel:
          - ["Straight ahead", "مستقیم", "جهت"]
      - q: "Where is ...?"
        a: "کجاست؟ ... "
        rel:
          - ["Where", "کجا", "کلمه پرسشی"]
          - ["is", "است", "فعل بودن"]
      - q: "Near"
        a: "نزدیک"
        rel:
          - ["Near", "نزدیک", "صفت"]
      - q: "Far"
        a: "دور"
        rel:
          - ["Far", "دور", "صفت"]
  - title: "وسایل حمل و نقل"
    explanation: |
      **وسایل حمل و نقل** – تاکسی، اتوبوس و مترو
      رایج‌ترین وسایل حمل و نقل در شهرها هستند.
    examples:
      - q: "Taxi"
        a: "تاکسی"
        rel:
          - ["Taxi", "تاکسی", "اسم"]
      - q: "Bus"
        a: "اتوبوس"
        rel:
          - ["Bus", "اتوبوس", "اسم"]
      - q: "Metro / Subway"
        a: "مترو"
        rel:
          - ["Metro", "مترو", "اسم"]
      - q: "Airport"
        a: "فرودگاه"
        rel:
          - ["Airport", "فرودگاه", "اسم"]
      - q: "Station / Stop"
        a: "ایستگاه"
        rel:
          - ["Station", "ایستگاه", "اسم"]
  - title: "جملات مهم سفر"
    explanation: |
      **جملات مفید برای مسافران** – این عبارات به شما کمک می‌کنند
      در کشورهای انگلیسی‌زبان راه خود را پیدا کنید و کمک بخواهید.
    examples:
      - q: "I am lost"
        a: "من گم شده‌ام"
        rel:
          - ["I", "من", "ضمیر"]
          - ["lost", "گم شده", "صفت"]
      - q: "Can you help me?"
        a: "می‌توانید کمکم کنید؟"
        rel:
          - ["Can", "توانستن", "فعل"]
          - ["help", "کمک", "فعل"]
      - q: "Where is the hotel?"
        a: "هتل کجاست؟"
        rel:
          - ["hotel", "هتل", "اسم"]
          - ["Where is", "کجاست", "کلمه پرسشی + فعل"]
      - q: "Please speak more slowly"
        a: "لطفاً آهسته‌تر صحبت کنید"
        rel:
          - ["slowly", "آهسته", "قید"]
          - ["speak", "صحبت کردن", "فعل"]
          - ["please", "لطفاً", "عبارت مؤدبانه"]
