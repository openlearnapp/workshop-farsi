version: 1
number: 4
title: "غذا و خرید"
description: "مواد غذایی، سفارش در رستوران و عبارات خرید به انگلیسی"
sections:
  - title: "مواد غذایی"
    explanation: |
      **غذاهای انگلیسی** – اینجا مهم‌ترین کلمات مربوط به
      غذا و نوشیدنی را به انگلیسی یاد می‌گیرید.
    examples:
      - q: "Bread"
        a: "نان"
        rel:
          - ["Bread", "نان", "اسم"]
      - q: "Rice"
        a: "برنج"
        rel:
          - ["Rice", "برنج", "اسم"]
      - q: "Meat"
        a: "گوشت"
        rel:
          - ["Meat", "گوشت", "اسم"]
      - q: "Chicken"
        a: "مرغ"
        rel:
          - ["Chicken", "مرغ", "اسم"]
      - q: "Water"
        a: "آب"
        rel:
          - ["Water", "آب", "اسم"]
      - q: "Tea"
        a: "چای"
        rel:
          - ["Tea", "چای", "اسم"]
  - title: "در رستوران"
    explanation: |
      **سفارش دادن در رستوران** – این جملات به شما کمک می‌کنند
      در رستوران انگلیسی‌زبان سفارش دهید.
    examples:
      - q: "The menu, please"
        a: "منو را لطفاً"
        rel:
          - ["menu", "منو", "اسم"]
          - ["please", "لطفاً", "عبارت مؤدبانه"]
      - q: "I would like this"
        a: "من این را می‌خواهم"
        rel:
          - ["I", "من", "ضمیر"]
          - ["would like", "می‌خواهم", "فعل"]
      - q: "The bill, please"
        a: "صورتحساب لطفاً"
        rel:
          - ["bill", "صورتحساب", "اسم"]
          - ["please", "لطفاً", "عبارت مؤدبانه"]
      - q: "It was very delicious"
        a: "خیلی خوشمزه بود"
        rel:
          - ["very", "خیلی", "قید"]
          - ["delicious", "خوشمزه", "صفت"]
          - ["was", "بود", "فعل بودن، گذشته"]
  - title: "خرید"
    explanation: |
      **خرید** – این عبارات در هنگام خرید در کشورهای انگلیسی‌زبان به شما کمک می‌کنند.
    examples:
      - q: "How much is this?"
        a: "این چند است؟"
        rel:
          - ["How much", "چند / چقدر", "کلمه پرسشی"]
          - ["this", "این", "ضمیر اشاره"]
      - q: "It is very expensive"
        a: "خیلی گران است"
        rel:
          - ["very", "خیلی", "قید"]
          - ["expensive", "گران", "صفت"]
      - q: "Can't it be cheaper?"
        a: "ارزان‌تر نمی‌شود؟"
        rel:
          - ["cheaper", "ارزان‌تر", "صفت تفضیلی"]
          - ["can't", "نمی‌تواند", "منفی"]
      - q: "I'll buy this"
        a: "این را می‌خرم"
        rel:
          - ["buy", "خریدن", "فعل"]
          - ["this", "این", "ضمیر اشاره"]
