version: 1
number: 3
title: "اعداد و زمان"
description: "اعداد ۱ تا ۲۰، روزهای هفته و ساعت به انگلیسی"
sections:
  - title: "اعداد ۱ تا ۱۰"
    explanation: |
      **اعداد انگلیسی** – اعداد پایه‌ای هستند که در زندگی روزمره
      به آن‌ها نیاز خواهید داشت. اینجا اعداد ۱ تا ۱۰ را یاد می‌گیرید.
    examples:
      - q: "One (1)"
        a: "یک / ۱"
        rel:
          - ["One", "یک", "عدد"]
      - q: "Two (2)"
        a: "دو / ۲"
        rel:
          - ["Two", "دو", "عدد"]
      - q: "Three (3)"
        a: "سه / ۳"
        rel:
          - ["Three", "سه", "عدد"]
      - q: "Four (4)"
        a: "چهار / ۴"
        rel:
          - ["Four", "چهار", "عدد"]
      - q: "Five (5)"
        a: "پنج / ۵"
        rel:
          - ["Five", "پنج", "عدد"]
  - title: "اعداد ۱۱ تا ۲۰"
    explanation: |
      **اعداد از ۱۱** در انگلیسی – برخی اعداد شکل خاص خود را دارند.
    examples:
      - q: "Eleven (11)"
        a: "یازده / ۱۱"
        rel:
          - ["Eleven", "یازده", "عدد"]
      - q: "Twelve (12)"
        a: "دوازده / ۱۲"
        rel:
          - ["Twelve", "دوازده", "عدد"]
      - q: "Thirteen (13)"
        a: "سیزده / ۱۳"
        rel:
          - ["Thirteen", "سیزده", "عدد"]
      - q: "Fifteen (15)"
        a: "پانزده / ۱۵"
        rel:
          - ["Fifteen", "پانزده", "عدد"]
      - q: "Twenty (20)"
        a: "بیست / ۲۰"
        rel:
          - ["Twenty", "بیست", "عدد"]
  - title: "روزهای هفته و ساعت"
    explanation: |
      **تقویم انگلیسی** هفته را معمولاً از یکشنبه یا دوشنبه شروع می‌کند.
      شنبه و یکشنبه روزهای تعطیل هستند.
    examples:
      - q: "Saturday"
        a: "شنبه"
        rel:
          - ["Saturday", "شنبه", "روز هفته"]
      - q: "Sunday"
        a: "یکشنبه"
        rel:
          - ["Sunday", "یکشنبه", "روز هفته"]
      - q: "Monday"
        a: "دوشنبه"
        rel:
          - ["Monday", "دوشنبه", "روز هفته"]
      - q: "Friday"
        a: "جمعه"
        rel:
          - ["Friday", "جمعه", "روز هفته"]
      - q: "What time is it?"
        a: "ساعت چند است؟"
        rel:
          - ["What time", "ساعت چند", "کلمه پرسشی"]
          - ["is", "است", "فعل بودن"]
