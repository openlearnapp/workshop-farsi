version: 1
number: 1
title: "احوالپرسی و ادب"
description: "مهم‌ترین احوالپرسی‌ها و عبارات مؤدبانه به انگلیسی"
sections:
  - title: "احوالپرسی"
    explanation: |
      **احوالپرسی انگلیسی** بخش مهمی از فرهنگ انگلیسی‌زبانان است.
      رایج‌ترین سلام "Hello" است که در همه موقعیت‌ها استفاده می‌شود.
    examples:
      - q: "Hello"
        a: "سلام"
        rel:
          - ["Hello", "سلام", "غیررسمی"]
      - q: "Good morning"
        a: "صبح بخیر"
        rel:
          - ["Good", "خوب", "صفت"]
          - ["morning", "صبح", "اسم"]
      - q: "Good evening"
        a: "عصر بخیر"
        rel:
          - ["Good", "خوب", "صفت"]
          - ["evening", "عصر", "اسم"]
      - q: "Good night"
        a: "شب بخیر"
        rel:
          - ["Good", "خوب", "صفت"]
          - ["night", "شب", "اسم"]
      - q: "Goodbye"
        a: "خداحافظ"
        rel:
          - ["Goodbye", "خداحافظ", "خداحافظی رسمی"]
  - title: "عبارات مؤدبانه"
    explanation: |
      **ادب** در زبان انگلیسی بسیار مهم است. اینجا مهم‌ترین
      عبارات مؤدبانه را یاد می‌گیرید.
    examples:
      - q: "Thank you"
        a: "ممنون / متشکرم"
        rel:
          - ["Thank you", "ممنون", "عبارت مؤدبانه"]
      - q: "Please"
        a: "لطفاً"
        rel:
          - ["Please", "لطفاً", "عبارت مؤدبانه"]
      - q: "You're welcome"
        a: "خواهش می‌کنم"
        rel:
          - ["You're welcome", "خواهش می‌کنم", "عبارت مؤدبانه"]
      - q: "Excuse me"
        a: "ببخشید"
        rel:
          - ["Excuse me", "ببخشید", "عبارت مؤدبانه"]
  - title: "معرفی خود"
    explanation: |
      **معرفی خود** برای آشنایی‌های جدید مهم است.
      جملات زیر به شما کمک می‌کنند خود را به انگلیسی معرفی کنید.
    examples:
      - q: "How are you?"
        a: "حال شما چطور است؟"
        rel:
          - ["How", "چطور", "کلمه پرسشی"]
          - ["are", "هستید", "فعل بودن"]
          - ["you", "شما", "ضمیر"]
      - q: "I'm fine, thank you"
        a: "خوبم، ممنون"
        rel:
          - ["fine", "خوب", "صفت"]
          - ["thank you", "ممنون", "عبارت مؤدبانه"]
      - q: "My name is ..."
        a: "اسم من ... است"
        rel:
          - ["My", "مال من", "ضمیر ملکی"]
          - ["name", "اسم / نام", "اسم"]
      - q: "Nice to meet you"
        a: "از آشنایی شما خوشوقتم"
        rel:
          - ["Nice", "خوشحال", "صفت"]
          - ["meet", "ملاقات کردن", "فعل"]
